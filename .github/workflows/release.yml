name: Zip and Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Create zip
        run: |
          cd extension
          zip -r ../release.zip .

      - name: Create release for commit SHA
        uses: softprops/action-gh-release@v2
        with:
          tag_name: sha-${{ github.sha }}
          name: Build ${{ github.sha }}
          prerelease: true
          files: release.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
